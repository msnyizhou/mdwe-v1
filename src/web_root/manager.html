<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交易觉知 - 文档管理器</title>
<link rel="stylesheet" href="libs/github-markdown-light.css">
<link rel="stylesheet" href="manager.css">
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>

<div class="left">
  <h3><i class="fa fa-file-text-o"></i> MD 文件列表</h3>
  <div id="fileList"></div>
  <button class="btn btn-blue" onclick="loadFileList(true)">刷新</button>
  <button class="btn btn-purple" onclick="newTradeLog()"><i class="fa fa-calendar-check-o"></i> 新建交易日志</button>
  <button class="btn btn-purple" onclick="openGraph()"><i class="fa fa-project-diagram"></i> 关系图谱</button>
</div>

<div class="middle" id="editPanel">
  <input id="filename" placeholder="文件名（例如：strategy.md）">
  <input id="title" placeholder="文章标题">

  <input id="categoryInput" placeholder="输入或选择分类" list="categoryList" style="width:100%;">
  <datalist id="categoryList"></datalist>

  <input id="date" placeholder="日期 2026-03-19">
  <input id="desc" placeholder="简短描述">
  
  <div class="cover-row">
    <input id="cover" placeholder="封面URL（可选）">
    <button id="fetchCoverBtn" onclick="fetchCoverImage()">获取封面</button>
  </div>

  <div class="toolbar">
    <button onclick="insertEmoji()"><i class="fa fa-smile-o"></i></button>

    <div class="dropdown">
      <button class="dropbtn"><i class="fa fa-header"></i> H</button>
      <div class="dropdown-content">
        <button onclick="insert('# ')">一级标题 H1</button>
        <button onclick="insert('## ')">二级标题 H2</button>
        <button onclick="insert('### ')">三级标题 H3</button>
        <button onclick="insert('#### ')">四级标题 H4</button>
        <button onclick="insert('##### ')">五级标题 H5</button>
        <button onclick="insert('###### ')">六级标题 H6</button>
      </div>
    </div>

    <button onclick="wrapSelection('**', '**')"><i class="fa fa-bold"></i></button>
    <button onclick="wrapSelection('*', '*')"><i class="fa fa-italic"></i></button>
    <button onclick="wrapSelection('~~', '~~')"><i class="fa fa-strikethrough"></i></button>

    <button onclick="insertLink()"><i class="fa fa-link"></i></button>

    <span class="toolbar-divider"></span>

    <button onclick="insert('- ')"><i class="fa fa-list-ul"></i></button>
    <button onclick="insert('1. ')"><i class="fa fa-list-ol"></i></button>
    <button onclick="insert('- [ ] ')"><i class="fa fa-check-square-o"></i></button>

    <span class="toolbar-divider"></span>

    <button onclick="insert('> ')"><i class="fa fa-quote-right"></i></button>
    <button onclick="insert('\n---\n')"><i class="fa fa-minus"></i></button>

    <button onclick="wrapSelection('`', '`')"><i class="fa fa-code"></i></button>
    <button onclick="insertCode()"><i class="fa fa-file-code-o"></i></button>

    <button onclick="insertTable()"><i class="fa fa-table"></i></button>

    <span class="toolbar-divider"></span>

    <button onclick="insertImg()"><i class="fa fa-picture-o"></i></button>
    <button onclick="pasteUploadImage()"><i class="fa fa-clipboard"></i></button>
    <button onclick="insertVideo()"><i class="fa fa-video-camera"></i></button>
    <button onclick="insertAudio()"><i class="fa fa-music"></i></button>

    <span class="toolbar-divider"></span>

    <button onclick="editorUndo()"><i class="fa fa-undo"></i></button>
    <button onclick="editorRedo()"><i class="fa fa-repeat"></i></button>

    <button id="colorBtn" onclick="openColorPicker()">
      <span class="color-dot" id="colorDot" style="background:#000000;"></span>
    </button>
    <input type="color" id="colorPicker" style="display:none;" onchange="setTextColor()">

    <div class="dropdown">
      <button class="dropbtn"><i class="fa fa-ellipsis-h"></i></button>
      <div class="dropdown-content">
        <button onclick="wrapSelection('==', '==')">高亮文本</button>
        <button onclick="wrapSelection('<u>', '</u>')">下划线</button>
        <button onclick="insert('$$\n$$')">公式块</button>
      </div>
    </div>
  </div>

  <div class="upload-progress" id="uploadProgress"><div class="progress-bar" id="progressBar"></div></div>

  <textarea id="editor" placeholder="在这里写纯Markdown正文内容"></textarea>

  <div class="btn-group">
    <button class="btn btn-green" onclick="saveFile()"><i class="fa fa-save"></i> 保存到 /md/</button>
    <button class="btn btn-red" onclick="deleteFile()"><i class="fa fa-trash"></i> 删除</button>
    <button class="btn btn-blue" onclick="newFile()"><i class="fa fa-plus"></i> 新建</button>
  </div>
</div>

<div id="dragBar">||</div>

<div class="right">
  <div id="preview" class="markdown-body"></div>
</div>

<div class="graph-modal" id="graphModal">
  <button class="graph-close" onclick="closeGraph()">关闭</button>
  <canvas class="graph-canvas" id="graphCanvas"></canvas>
</div>





<script src="libs/marked.min.js"></script>
<script src="libs/three.min.js"></script>
<script src="libs/OrbitControls.js"></script>
<script src="manager.js"></script>
</body>
</html>
